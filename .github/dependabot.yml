version: 2
updates:
  # Go module dependencies.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    # Wait 5 days after a release is published before opening an update PR,
    # so freshly-cut versions have time to be yanked or superseded.
    cooldown:
      default-days: 5
    open-pull-requests-limit: 10

  # GitHub Actions used in our workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 5
    open-pull-requests-limit: 10
