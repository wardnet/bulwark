version: 2
updates:
  # Go module dependencies.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    # Wait 5 days after a release is published before opening an update PR,
    # so freshly-cut versions have time to be yanked or superseded. 5 days is
    # the deliberate org-wide convention (matches wardnet/wardnet-cloud/inforge).
    cooldown:
      default-days: 5 # nosemgrep: package_managers.dependabot.dependabot-missing-cooldown.dependabot-missing-cooldown
    open-pull-requests-limit: 10

  # GitHub Actions used in our workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # 5 days is the deliberate org-wide convention (matches wardnet/wardnet-cloud/inforge).
    cooldown:
      default-days: 5 # nosemgrep: package_managers.dependabot.dependabot-missing-cooldown.dependabot-missing-cooldown
    open-pull-requests-limit: 10
